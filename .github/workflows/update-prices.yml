name: Update Price Data

on:
  schedule:
    # Run daily at 06:00 UTC (US market closes at 21:00 UTC / 06:00 JST next day)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest prices
        id: fetch
        run: |
          python scripts/fetch_prices.py && echo "updated=true" >> "$GITHUB_OUTPUT" || echo "updated=false" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.fetch.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet && exit 0
          git commit -m "Update price data ($(date -u +%Y-%m-%d))"
          git push
